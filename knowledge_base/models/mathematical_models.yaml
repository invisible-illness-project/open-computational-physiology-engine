      - symbol: "tauE"
        units: "s"
        nominal_value: 12.5
        description: "Time constant for ventricular elastance control"
      - symbol: "EdM"
        units: "mmHg/ml"
        nominal_value: 0.03125
        description: "Maximum end-diastolic ventricular elastance"
      - symbol: "Edm"
        units: "mmHg/ml"
        nominal_value: 0.00025
        description: "Minimum end-diastolic ventricular elastance"
      - symbol: "p2E"
        units: "mmHg"
        nominal_value: 76.62
        description: "Half-saturation carotid pressure for elastance control"
      - symbol: "kH"
        units: "dimensionless"
        nominal_value: 25.0
        phenotypes:
          - phenotype: "hyperadrenergic_pots"
            value: 40.0 # Increased sensitivity/gain
        description: "Hill coefficient for heart rate control"
      - symbol: "tauH"
        units: "s"
        nominal_value: 6.25
        description: "Time constant for heart rate control"
      - symbol: "HM"
