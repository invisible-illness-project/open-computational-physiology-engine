version: "3.0"
relationship_definitions:
  - predicate: "CAUSES"
    description: "A directly causal biological link where changes in subject lead to changes in object."
  - predicate: "INCREASES"
    description: "A positive directional modulation; increasing subject increases object."
  - predicate: "DECREASES"
    description: "A negative directional modulation; increasing subject decreases object."
  - predicate: "REGULATES"
    description: "An active feedback control loop relationship (e.g., baroreflex regulates heart rate)."
  - predicate: "DERIVED_FROM"
    description: "A mathematical or direct physical derivation (e.g., MAP derived from SBP/DBP)."
  - predicate: "MEASURED_BY"
    description: "An association where a sensor directly measures a physical variable."
  - predicate: "ESTIMATED_BY"
    description: "An association where a variable is estimated via proxy sensor measurements."
  - predicate: "VALIDATED_BY"
    description: "Links a model, relationship, or variable to a validation dataset."
  - predicate: "PERTURBED_BY"
    description: "Indicates that a disease, medication, or external stressor alters this variable."
  - predicate: "MODULATED_BY"
    description: "Indicates that a behavior or circadian state alters a physiological state."
  - predicate: "PART_OF"
    description: "A structural or organizational containment link (e.g., heart is part of cardiovascular system)."
  - predicate: "ASSOCIATED_WITH"
    description: "A statistical correlation or physiological association without direct causal proof."

semantic_relationships:
  - subject: "pcm"
    predicate: "REGULATES"
    object: "Hc"
    confidence: 10
    evidence_level: "Level 1"
    supporting_publications:
      - doi: "10.1098/rsif.2022.0220"
    known_limitations: "Assumes instantaneous baroreceptor firing which is valid under macroscopic timescales but lacks myelinated/unmyelinated fiber distinction."
    applicable_populations:
      - "healthy_control_cohort"
      - "pots_clinical_cohort"

  - subject: "neuropathic_pots"
    predicate: "PERTURBED_BY"
    object: "RalpM"
    confidence: 9
    evidence_level: "Level 2"
    supporting_publications:
      - doi: "10.1098/rsif.2022.0220"
    known_limitations: "Severity varies based on individual autonomic neuropathy patterns."
    applicable_populations:
      - "pots_clinical_cohort"

  - subject: "L_stress"
    predicate: "INCREASES"
    object: "T_sym"
    confidence: 8
    evidence_level: "Level 2"
    supporting_publications:
      - doi: "10.1098/rsif.2022.0220"
    known_limitations: "Allostatic response is highly individualized."
    applicable_populations:
      - "healthy_control_cohort"
      - "pots_clinical_cohort"

  - subject: "H_hydr"
    predicate: "INCREASES"
    object: "V_total"
    confidence: 9
    evidence_level: "Level 1"
    supporting_publications:
      - doi: "10.1098/rsif.2022.0220"
    known_limitations: "Varies depending on electrolyte balance and renal function."
    applicable_populations:
      - "healthy_control_cohort"
      - "pots_clinical_cohort"

  - subject: "D_circ"
    predicate: "MODULATED_BY"
    object: "T_sym"
    confidence: 8
    evidence_level: "Level 2"
    supporting_publications:
      - doi: "10.1098/rsif.2022.0220"
    known_limitations: "Subject to jetlag, night shift schedules, and individual chronotype."
    applicable_populations:
      - "healthy_control_cohort"

  - subject: "RMSSD"
    predicate: "DERIVED_FROM"
    object: "rr_intervals"
    confidence: 10
    evidence_level: "Level 1"
    supporting_publications:
      - doi: "10.3390/s22176536"
