version: "3.0"
concepts:
  - id: "PhysiologicalVariable"
    name: "Physiological Variable"
    description: "A time-varying observable physiological quantity (e.g., heart rate, blood pressure)."
  - id: "LatentState"
    name: "Latent State"
    description: "A hidden, unobserved internal physiological parameter or state variable (e.g., sympathetic tone, blood volume)."
  - id: "OrganSystem"
    name: "Organ System"
    description: "An integrated network of organs working together (e.g., cardiovascular system, autonomic nervous system)."
  - id: "Organ"
    name: "Anatomy Organ"
    description: "A structural unit in the body that performs specific functions (e.g., heart, blood vessels)."
  - id: "Mechanism"
    name: "Causal Mechanism"
    description: "A biological pathway explaining cause-and-effect relationships."
  - id: "Process"
    name: "Physiological Process"
    description: "A dynamic sequence of events or functions (e.g., baroreflex regulation)."
  - id: "Measurement"
    name: "Observation Measurement"
    description: "A reading or value captured by a sensor from a physiological variable."
  - id: "Sensor"
    name: "Wearable or Clinical Sensor"
    description: "A hardware device or method used to measure physiological states."
  - id: "MathematicalEquation"
    name: "Mathematical Equation"
    description: "A mathematical description (e.g., ODE, algebraic formula) of a physiological process or relationship."
  - id: "Disease"
    name: "Disease or Syndrome"
    description: "A clinical condition or phenotype that perturbs healthy physiology."
  - id: "Intervention"
    name: "Clinical Intervention or Stressor"
    description: "An external test or therapy applied to the system (e.g., head-up tilt test)."
  - id: "Medication"
    name: "Medication or Drug"
    description: "A pharmacological agent that perturbs physiological pathways."
  - id: "Behavior"
    name: "Patient Behavior"
    description: "An activity or lifestyle choice (e.g., exercise, sleep, meals, hydration)."
  - id: "Population"
    name: "Demographic Population"
    description: "A cohort defined by age, sex, BMI, fitness, and other priors."
  - id: "ValidationDataset"
    name: "Validation Dataset"
    description: "Clinical or experimental data used to evaluate model plausibility."
  - id: "Publication"
    name: "Scientific Publication"
    description: "A peer-reviewed scientific paper (represented by DOI/PMID) providing evidence."
  - id: "Evidence"
    name: "Evidence Level"
    description: "A grading of scientific certainty (e.g., Level 1 RCT, Level 4 in-silico)."
