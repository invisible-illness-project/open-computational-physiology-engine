version: "2.1"
concepts:
  - id: "Variable"
    name: "Physiological or Sensor Variable"
    description: "A time-varying quantitative state representing a physical, chemical, or electrical property."
  - id: "System"
    name: "Physiological System"
    description: "An integrated network of organs and tissues working together to perform a physiological function."
  - id: "Organ"
    name: "Anatomical Organ"
    description: "A specialized structural unit in the body that performs specific functions (e.g., heart, brain)."
  - id: "Process"
    name: "Physiological Process"
    description: "A sequence of physiological operations or functions (e.g., ventricular contraction, baroreflex feedback)."
  - id: "Mechanism"
    name: "Causal Mechanism"
    description: "A mechanistic pathway or linkage that explains a cause-and-effect relationship between variables."
  - id: "Measurement"
    name: "Observation/Measurement"
    description: "A quantitative estimation of a physiological variable made by a sensor or clinical device."
  - id: "Sensor"
    name: "Wearable or Clinical Sensor"
    description: "An instrument or device used to detect and measure physiological signals."
  - id: "Disease"
    name: "Pathology or Syndrome"
    description: "A clinical condition or phenotype that perturbs healthy physiological state variables."
  - id: "Intervention"
    name: "Clinical Intervention or Stressor"
    description: "An external stimulus, test, or treatment applied to the physiological system (e.g., tilt table test, medication)."
  - id: "Population"
    name: "Demographic Cohort"
    description: "A group of virtual or clinical subjects sharing specific demographic, anatomical, or health attributes."
  - id: "Evidence"
    name: "Scientific Evidence"
    description: "Peer-reviewed literature, clinical studies, or in-silico validations supporting a physiological claim."
  - id: "Equation"
    name: "Mathematical Equation"
    description: "A canonical mathematical model or ODE describing a physiological mechanism or transition."
  - id: "ValidationDataset"
    name: "Validation Reference Dataset"
    description: "A set of clinical or historical data used to benchmark and evaluate simulation plausibility."
