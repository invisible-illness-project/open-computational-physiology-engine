version: "1.0"
disease:
  id: "medication"
  name: "Medication Perturbations"
  abbreviation: "MEDS"
  description: "Pharmacological modifications to cardiovascular and fluid homeostatic parameters."
  phenotypes:
    - id: "beta_blocker"
      name: "Beta-Adrenergic Blockade"
      description: "Blunts chronotropic and inotropic sympathetic responses, limiting maximum heart rate."
      parameters_perturbed:
        - symbol: "HM"
          normal_value: 3.3333
          perturbed_value: 2.2
          units: "bps"
          mechanism: "Competitive antagonism of beta-1 adrenergic receptors, capping maximum heart rate (approx 132 bpm)."
          provenance:
            doi: "10.1161/01.CIR.94.11.2824"
            evidence_level: "Level 1"
        - symbol: "kH"
          normal_value: 25.0
          perturbed_value: 12.0
          units: "dimensionless"
          mechanism: "Reduces heart rate control gain sensitivity to pressure changes."
          provenance:
            doi: "10.1161/01.CIR.94.11.2824"
            evidence_level: "Level 1"
    - id: "fludrocortisone"
      name: "Fludrocortisone Fluid Expansion"
      description: "Mineralocorticoid receptor agonist that increases blood volume and sodium retention."
      parameters_perturbed:
        - symbol: "TotalVol"
          normal_value: 4500.0
          perturbed_value: 5000.0
          units: "ml"
          mechanism: "Expands intravascular blood volume via renal sodium reabsorption and osmotic fluid shift."
          provenance:
            doi: "10.1161/01.HYP.30.5.1102"
            evidence_level: "Level 1"
