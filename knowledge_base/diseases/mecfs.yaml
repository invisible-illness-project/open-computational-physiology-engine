version: "1.0"
disease:
  id: "mecfs"
  name: "Myalgic Encephalomyelitis / Chronic Fatigue Syndrome"
  abbreviation: "ME/CFS"
  description: "A complex multi-system illness characterized by profound fatigue, post-exertional malaise (PEM), unrefreshing sleep, cognitive impairment, and orthostatic intolerance."
  phenotypes:
    - id: "mecfs_metabolic_dysfunction"
      name: "ME/CFS Metabolic Blunting"
      description: "Severe depletion of metabolic reserve capacity, impaired autonomic response time constants, and delayed recovery kinetics."
      parameters_perturbed:
        - symbol: "HM"
          normal_value: 3.3333
          perturbed_value: 2.6
          units: "bps"
          mechanism: "Blunted maximum chronotropic response (chronotropic incompetence) preventing normal heart rate acceleration."
          provenance:
            doi: "10.1186/s12967-020-02575-x"
            evidence_level: "Level 2"
        - symbol: "tauH"
          normal_value: 6.25
          perturbed_value: 12.0
          units: "s"
          mechanism: "Slower autonomic heart rate adjustment rate due to parasympathetic/sympathetic sluggishness."
          provenance:
            doi: "10.1186/s12967-020-02575-x"
            evidence_level: "Level 3"
        - symbol: "taur"
          normal_value: 12.5
          perturbed_value: 25.0
          units: "s"
          mechanism: "Delayed peripheral vasoconstriction response to posture changes, increasing transient orthostatic drop."
          provenance:
            doi: "10.1186/s12967-020-02575-x"
            evidence_level: "Level 3"
